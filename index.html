<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0002" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ultron" />
    <title>ULTRON</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="scanlines"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <header class="hud-header">
      <span class="hud-tag">U.L.T.R.O.N</span>
      <span class="hud-tag hud-tag-right" id="clock">00:00:00</span>
    </header>

    <main class="stage">
      <div class="core-wrap" id="core" tabindex="0" role="button" aria-label="Aktifkan Ultron">
        <div class="ring ring-outer"></div>
        <div class="ring ring-mid"></div>
        <div class="ring ring-inner"></div>
        <canvas id="wave" width="360" height="360"></canvas>
        <div class="core-glow"></div>
        <div class="core-eye"></div>
      </div>

      <div class="status-line" id="status">SISTEM SIAGA — SENTUH UNTUK MENGAKTIFKAN</div>
    </main>

    <section class="console" id="console">
      <div class="console-inner" id="log"></div>
    </section>

    <div class="login-overlay" id="loginOverlay" hidden>
      <form class="login-form" id="loginForm">
        <h1>SAMBUNGKAN KE MK CONNECT</h1>
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="username" required />
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required />
        <button type="submit">MASUK</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
